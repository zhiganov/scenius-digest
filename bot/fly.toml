app = "scenius-digest-bot"
primary_region = "ams"

[build]

[env]
  DIGEST_DAY = "0"
  DIGEST_HOUR = "9"
  DIGEST_CHANNEL_ID = "-1002708526104"
  DATA_DIR = "/app/data"

[mounts]
  source = "scenius_data"
  destination = "/app/data"

[[vm]]
  size = "shared-cpu-1x"
  memory = "256mb"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
